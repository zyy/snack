<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <!-- Gradients -->
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="nettyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="zkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSmall" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#0f0f23"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a3e" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="32" font-weight="bold">
    Snack RPC Framework Architecture
  </text>
  <text x="600" y="75" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif" font-size="14">
    High Performance Distributed RPC Framework based on Netty4
  </text>
  
  <!-- ==================== CLIENT SIDE ==================== -->
  <g filter="url(#shadow)">
    <!-- Client Container -->
    <rect x="50" y="120" width="340" height="340" rx="15" fill="#1a1a3e" stroke="url(#clientGrad)" stroke-width="2"/>
    
    <!-- Client Header -->
    <rect x="50" y="120" width="340" height="40" rx="15" fill="url(#clientGrad)"/>
    <rect x="50" y="145" width="340" height="15" fill="url(#clientGrad)"/>
    <text x="220" y="147" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Client Side
    </text>
  </g>
  
  <!-- Application Layer -->
  <g filter="url(#shadowSmall)">
    <rect x="80" y="180" width="280" height="60" rx="8" fill="#2d2d5a"/>
    <text x="220" y="205" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Application Layer
    </text>
    <text x="220" y="225" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="11">
      Business Service Proxy
    </text>
  </g>
  
  <!-- RpcFuture -->
  <g filter="url(#shadowSmall)">
    <rect x="90" y="260" width="120" height="45" rx="6" fill="#3d3d6a"/>
    <text x="150" y="278" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      RpcFuture
    </text>
    <text x="150" y="295" text-anchor="middle" fill="#8080b0" font-family="Arial, sans-serif" font-size="9">
      Async / Callback
    </text>
  </g>
  
  <!-- CircuitBreaker -->
  <g filter="url(#shadowSmall)">
    <rect x="220" y="260" width="120" height="45" rx="6" fill="#3d3d6a"/>
    <text x="280" y="278" text-anchor="middle" fill="#f5576c" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      CircuitBreaker
    </text>
    <text x="280" y="295" text-anchor="middle" fill="#8080b0" font-family="Arial, sans-serif" font-size="9">
      CLOSED/OPEN/HALF
    </text>
  </g>
  
  <!-- RateLimiter -->
  <g filter="url(#shadowSmall)">
    <rect x="90" y="315" width="120" height="45" rx="6" fill="#3d3d6a"/>
    <text x="150" y="333" text-anchor="middle" fill="#38ef7d" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      RateLimiter
    </text>
    <text x="150" y="350" text-anchor="middle" fill="#8080b0" font-family="Arial, sans-serif" font-size="9">
      Token Bucket
    </text>
  </g>
  
  <!-- RetryPolicy -->
  <g filter="url(#shadowSmall)">
    <rect x="220" y="315" width="120" height="45" rx="6" fill="#3d3d6a"/>
    <text x="280" y="333" text-anchor="middle" fill="#fee140" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      RetryPolicy
    </text>
    <text x="280" y="350" text-anchor="middle" fill="#8080b0" font-family="Arial, sans-serif" font-size="9">
      EXP/FIXED/FIB
    </text>
  </g>
  
  <!-- RpcInvoker -->
  <g filter="url(#shadowSmall)">
    <rect x="80" y="380" width="280" height="60" rx="8" fill="#2d2d5a" stroke="#667eea" stroke-width="1"/>
    <text x="220" y="405" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      RpcInvoker (Dynamic Proxy)
    </text>
    <text x="220" y="425" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="11">
      Load Balance + Retry + Timeout
    </text>
  </g>
  
  <!-- ==================== NETWORK LAYER ==================== -->
  <!-- TCP Connection -->
  <g>
    <rect x="430" y="250" width="100" height="100" rx="10" fill="#1a1a3e" stroke="#764ba2" stroke-width="2"/>
    <text x="480" y="295" text-anchor="middle" fill="#764ba2" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      TCP
    </text>
    <text x="480" y="315" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="10">
      Connection
    </text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#11998e"/>
    </marker>
  </defs>
  
  <!-- Client to TCP -->
  <path d="M 390 300 L 420 300" stroke="url(#clientGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- TCP to Server -->
  <path d="M 530 300 L 560 300" stroke="url(#serverGrad)" stroke-width="3" marker-end="url(#arrowhead2)"/>
  
  <!-- ==================== SERVER SIDE ==================== -->
  <g filter="url(#shadow)">
    <!-- Server Container -->
    <rect x="590" y="120" width="340" height="340" rx="15" fill="#1a1a3e" stroke="url(#serverGrad)" stroke-width="2"/>
    
    <!-- Server Header -->
    <rect x="590" y="120" width="340" height="40" rx="15" fill="url(#serverGrad)"/>
    <rect x="590" y="145" width="340" height="15" fill="url(#serverGrad)"/>
    <text x="760" y="147" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">
      Server Side
    </text>
  </g>
  
  <!-- Business Service -->
  <g filter="url(#shadowSmall)">
    <rect x="620" y="180" width="280" height="60" rx="8" fill="#2d2d5a"/>
    <text x="760" y="205" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Business Service
    </text>
    <text x="760" y="225" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="11">
      DemoService / UserService / OrderService
    </text>
  </g>
  
  <!-- Thread Pool -->
  <g filter="url(#shadowSmall)">
    <rect x="620" y="260" width="280" height="60" rx="8" fill="#2d2d5a" stroke="#11998e" stroke-width="1"/>
    <text x="760" y="285" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">
      Thread Pool (Bounded)
    </text>
    <text x="760" y="305" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="11">
      Core:16 | Max:64 | Queue:1024
    </text>
  </g>
  
  <!-- ServerHandler -->
  <g filter="url(#shadowSmall)">
    <rect x="620" y="340" width="280" height="50" rx="6" fill="#3d3d6a"/>
    <text x="760" y="362" text-anchor="middle" fill="#38ef7d" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      ServerHandler + HeartbeatHandler
    </text>
    <text x="760" y="378" text-anchor="middle" fill="#8080b0" font-family="Arial, sans-serif" font-size="10">
      IdleStateHandler Auto-Probe
    </text>
  </g>
  
  <!-- Pipeline -->
  <g filter="url(#shadowSmall)">
    <rect x="620" y="400" width="280" height="45" rx="6" fill="#3d3d6a"/>
    <text x="760" y="420" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      Netty Pipeline: Decoder → Handler → Encoder
    </text>
  </g>
  
  <!-- ==================== REGISTRY ==================== -->
  <g filter="url(#shadow)">
    <rect x="50" y="490" width="340" height="150" rx="15" fill="#1a1a3e" stroke="url(#zkGrad)" stroke-width="2"/>
    
    <!-- ZK Header -->
    <rect x="50" y="490" width="340" height="35" rx="15" fill="url(#zkGrad)"/>
    <rect x="50" y="512" width="340" height="13" fill="url(#zkGrad)"/>
    <text x="220" y="514" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      ZooKeeper Registry
    </text>
  </g>
  
  <!-- ZK Content -->
  <g filter="url(#shadowSmall)">
    <rect x="70" y="545" width="300" height="75" rx="6" fill="#2d2d5a"/>
    <text x="220" y="570" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      /snack/serviceDiscovery
    </text>
    <text x="220" y="590" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="10">
      registerService() / queryForInstances()
    </text>
    <text x="220" y="608" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="10">
      Service Discovery + Health Check
    </text>
  </g>
  
  <!-- Registry Arrows -->
  <path d="M 390 290 L 420 540" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  <path d="M 590 290 L 560 540" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  
  <!-- ==================== MONITORING ==================== -->
  <g filter="url(#shadow)">
    <rect x="590" y="490" width="340" height="150" rx="15" fill="#1a1a3e" stroke="url(#monitorGrad)" stroke-width="2"/>
    
    <!-- Monitor Header -->
    <rect x="590" y="490" width="340" height="35" rx="15" fill="url(#monitorGrad)"/>
    <rect x="590" y="512" width="340" height="13" fill="url(#monitorGrad)"/>
    <text x="760" y="514" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      TraceCollector + Metrics
    </text>
  </g>
  
  <!-- Metrics -->
  <g filter="url(#shadowSmall)">
    <rect x="610" y="545" width="150" height="75" rx="6" fill="#2d2d5a"/>
    <text x="685" y="568" text-anchor="middle" fill="#fa709a" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      QPS / Latency
    </text>
    <text x="685" y="588" text-anchor="middle" fill="#fee140" font-family="Arial, sans-serif" font-size="10">
      P50 / P90 / P99
    </text>
    <text x="685" y="608" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Success Rate
    </text>
  </g>
  
  <!-- Traces -->
  <g filter="url(#shadowSmall)">
    <rect x="770" y="545" width="150" height="75" rx="6" fill="#2d2d5a"/>
    <text x="845" y="568" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Trace / Span
    </text>
    <text x="845" y="588" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="10">
      TraceId Propagation
    </text>
    <text x="845" y="608" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Sampling Rate
    </text>
  </g>
  
  <!-- Monitor Arrows -->
  <path d="M 760 460 L 760 480" stroke="#fa709a" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 840 460 L 840 480" stroke="#fa709a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ==================== ADMIN DASHBOARD ==================== -->
  <g filter="url(#shadow)">
    <rect x="960" y="250" width="180" height="280" rx="15" fill="#1a1a3e" stroke="#fa709a" stroke-width="2"/>
    
    <!-- Admin Header -->
    <rect x="960" y="250" width="180" height="35" rx="15" fill="#fa709a"/>
    <rect x="960" y="272" width="180" height="13" fill="#fa709a"/>
    <text x="1050" y="274" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
      Admin Dashboard
    </text>
  </g>
  
  <g filter="url(#shadowSmall)">
    <rect x="975" y="300" width="150" height="40" rx="5" fill="#2d2d5a"/>
    <text x="1050" y="320" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">
      📊 Service List
    </text>
  </g>
  
  <g filter="url(#shadowSmall)">
    <rect x="975" y="350" width="150" height="40" rx="5" fill="#2d2d5a"/>
    <text x="1050" y="370" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">
      📈 Metrics Dashboard
    </text>
  </g>
  
  <g filter="url(#shadowSmall)">
    <rect x="975" y="400" width="150" height="40" rx="5" fill="#2d2d5a"/>
    <text x="1050" y="420" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">
      🔴 Circuit Status
    </text>
  </g>
  
  <g filter="url(#shadowSmall)">
    <rect x="975" y="450" width="150" height="40" rx="5" fill="#2d2d5a"/>
    <text x="1050" y="470" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">
      🔍 Trace List
    </text>
  </g>
  
  <!-- Admin Arrow -->
  <path d="M 930 380 L 950 380" stroke="#fa709a" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ==================== PROTOCOL ==================== -->
  <g filter="url(#shadow)">
    <rect x="50" y="670" width="880" height="100" rx="10" fill="#1a1a3e" stroke="#f5576c" stroke-width="2"/>
    <text x="490" y="695" text-anchor="middle" fill="#f5576c" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
      Protocol Layer: ProtoStuff Serialization + Custom RPC Protocol
    </text>
    
    <!-- Protocol Box -->
    <g filter="url(#shadowSmall)">
      <rect x="80" y="710" width="160" height="40" rx="5" fill="#2d2d5a"/>
      <text x="160" y="735" text-anchor="middle" fill="#f5576c" font-family="Arial, sans-serif" font-size="11">
        Magic: 0xSNACK
      </text>
    </g>
    
    <g filter="url(#shadowSmall)">
      <rect x="260" y="710" width="100" height="40" rx="5" fill="#2d2d5a"/>
      <text x="310" y="735" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif" font-size="11">
        Version
      </text>
    </g>
    
    <g filter="url(#shadowSmall)">
      <rect x="380" y="710" width="100" height="40" rx="5" fill="#2d2d5a"/>
      <text x="430" y="735" text-anchor="middle" fill="#38ef7d" font-family="Arial, sans-serif" font-size="11">
        FullLength
      </text>
    </g>
    
    <g filter="url(#shadowSmall)">
      <rect x="500" y="710" width="100" height="40" rx="5" fill="#2d2d5a"/>
      <text x="550" y="735" text-anchor="middle" fill="#fee140" font-family="Arial, sans-serif" font-size="11">
        MessageType
      </text>
    </g>
    
    <g filter="url(#shadowSmall)">
      <rect x="620" y="710" width="140" height="40" rx="5" fill="#2d2d5a"/>
      <text x="690" y="735" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="11">
        TraceId (UUID)
      </text>
    </g>
    
    <g filter="url(#shadowSmall)">
      <rect x="780" y="710" width="130" height="40" rx="5" fill="#2d2d5a"/>
      <text x="845" y="735" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="11">
        Serialized Body
      </text>
    </g>
  </g>
  
  <!-- ==================== BOTTOM LEGEND ==================== -->
  <g filter="url(#shadow)">
    <rect x="50" y="800" width="1100" height="70" rx="10" fill="#1a1a3e" stroke="#333366" stroke-width="1"/>
    
    <text x="100" y="825" text-anchor="middle" fill="#667eea" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Client
    </text>
    <text x="220" y="825" text-anchor="middle" fill="#11998e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Server
    </text>
    <text x="340" y="825" text-anchor="middle" fill="#4facfe" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Registry
    </text>
    <text x="480" y="825" text-anchor="middle" fill="#f5576c" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Protocol
    </text>
    <text x="620" y="825" text-anchor="middle" fill="#fa709a" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Monitoring
    </text>
    <text x="760" y="825" text-anchor="middle" fill="#fee140" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Circuit
    </text>
    <text x="880" y="825" text-anchor="middle" fill="#38ef7d" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Rate Limit
    </text>
    <text x="1000" y="825" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
      Retry
    </text>
    
    <text x="100" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Consumer
    </text>
    <text x="220" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Provider
    </text>
    <text x="340" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Zookeeper
    </text>
    <text x="480" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      ProtoStuff
    </text>
    <text x="620" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      TraceCollector
    </text>
    <text x="760" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Breaker
    </text>
    <text x="880" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Token Bucket
    </text>
    <text x="1000" y="855" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="9">
      Backoff
    </text>
  </g>
</svg>
