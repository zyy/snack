# Snack RPC Framework Configuration
# Reference: all available configuration options
# Copy to application.conf and override as needed
# ================================

# Server Configuration
server {
  port = 9999
  name = "com.snack.demo.service"
}

# Zookeeper Registry Configuration
zookeeper {
  connectString = "192.168.9.153:2181"
  basePath = "/snack/serviceDiscovery"
}

# RPC Client Configuration
rpc {
  # Invoke timeout in milliseconds
  invoke.timeout = 5000
  
  # Retry configuration
  invoke.retry {
    # Enable retry on failure
    enable = true
    # Max attempts (including first)
    maxAttempts = 3
    # Base delay in milliseconds
    baseDelayMs = 100
    # Max delay cap in milliseconds
    maxDelayMs = 2000
    # Strategy: FIXED, EXPONENTIAL, FIBONACCI, JITTER
    strategy = "EXPONENTIAL"
    # Jitter factor (0.0 to 1.0), adds randomness to delays
    jitter = 0.2
  }
  
  # Circuit Breaker configuration
  circuitBreaker {
    # Enable circuit breaker
    enable = true
    # Number of failures before opening circuit
    failureThreshold = 5
    # Time to wait before trying again (milliseconds)
    recoveryTimeoutMs = 30000
    # Max calls allowed in half-open state
    halfOpenMaxCalls = 3
  }
  
  # Rate Limiter configuration
  rateLimit {
    # Max requests per second
    qps = 100
    # Burst capacity (max concurrent requests)
    burst = 50
  }
}

# RPC Server Configuration
rpc.server {
  # Worker threads for NIO event loop (0 = 2 * CPU cores)
  workerThreads = 0
  
  # Thread pool configuration
  threadPool {
    # Core pool size
    corePoolSize = 16
    # Maximum pool size
    maxPoolSize = 64
    # Queue capacity (prevent OOM)
    queueCapacity = 1024
    # Keep alive seconds for idle threads
    keepAliveSeconds = 60
  }
  
  # Heartbeat configuration (in seconds)
  heartbeat {
    # Server sends ping if no write for this time
    writerIdleTime = 10
    # Close connection if no read for this time
    readerIdleTime = 30
  }
}

# Tracing and Metrics Configuration
tracing {
  # Enable distributed tracing
  enabled = true
  # Sampling rate (0-100) percentage of requests to trace
  sampleRate = 100
  # Maximum number of spans to keep in memory
  maxSpans = 10000
  # Metrics window size for percentile calculations
  latencyWindow = 1000
  
  # Export configuration (optional)
  export {
    # Can be "log", "jmx", "http", or "none"
    type = "log"
    # For http export: endpoint URL
    httpEndpoint = ""
    # Export interval in seconds
    intervalSeconds = 30
  }
}
