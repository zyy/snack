# Snack RPC Framework Configuration
# ================================

# Server Configuration
server {
  port = 9999
  name = "com.snack.demo.service"
}

# Zookeeper Registry Configuration
zookeeper {
  connectString = "192.168.9.153:2181"
  basePath = "/snack/serviceDiscovery"
}

# RPC Client Configuration
rpc {
  # Invoke timeout in milliseconds
  invoke.timeout = 5000
  
  # Max retry count when invoke fails
  invoke.retry = 2
}

# RPC Server Configuration
rpc.server {
  # Worker threads for NIO event loop (0 = 2 * CPU cores)
  workerThreads = 0
  
  # Thread pool configuration
  threadPool {
    # Core pool size
    corePoolSize = 16
    # Maximum pool size
    maxPoolSize = 64
    # Queue capacity (prevent OOM)
    queueCapacity = 1024
    # Keep alive seconds for idle threads
    keepAliveSeconds = 60
  }
  
  # Heartbeat configuration (in seconds)
  heartbeat {
    # Server sends ping if no write for this time
    writerIdleTime = 10
    # Close connection if no read for this time
    readerIdleTime = 30
  }
}
