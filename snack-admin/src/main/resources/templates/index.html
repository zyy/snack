<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack RPC Admin</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
        .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .glow-yellow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); }
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="text-slate-100 min-h-screen">
    <div id="app">
        <!-- Navigation -->
        <nav class="glass border-b border-slate-700 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
                            <span class="text-xl">⚡</span>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-white">Snack RPC Admin</h1>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <router-link to="/dashboard" class="px-4 py-2 rounded-lg hover:bg-slate-700" :class="$route.path=='/dashboard'?'bg-violet-600':''">监控</router-link>
                        <router-link to="/services" class="px-4 py-2 rounded-lg hover:bg-slate-700" :class="$route.path=='/services'?'bg-violet-600':''">服务</router-link>
                        <router-link to="/circuit" class="px-4 py-2 rounded-lg hover:bg-slate-700" :class="$route.path=='/circuit'?'bg-violet-600':''">熔断</router-link>
                        <router-link to="/system" class="px-4 py-2 rounded-lg hover:bg-slate-700" :class="$route.path=='/system'?'bg-violet-600':''">系统</router-link>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Dashboard -->
        <router-view></router-view>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const { createRouter, createWebHistory } = VueRouter;

        // Dashboard Component
        const Dashboard = {
            template: `
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <h2 class="text-3xl font-bold text-white mb-2">📊 实时监控</h2>
                    <p class="text-slate-400 mb-8">实时监控 RPC 服务的健康状态</p>
                    
                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <p class="text-slate-400 text-sm mb-1">当前 QPS</p>
                            <p class="text-4xl font-bold text-blue-400">{{ metrics.globalQps || 0 }}</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <p class="text-slate-400 text-sm mb-1">成功率</p>
                            <p class="text-4xl font-bold text-green-400">{{ ((metrics.successRate || 0) * 100).toFixed(1) }}%</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <p class="text-slate-400 text-sm mb-1">总调用</p>
                            <p class="text-4xl font-bold text-purple-400">{{ formatNumber(metrics.totalCalls || 0) }}</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <p class="text-slate-400 text-sm mb-1">熔断状态</p>
                            <p class="text-2xl font-bold" :class="openCount > 0 ? 'text-red-400' : 'text-green-400'">{{ openCount > 0 ? 'OPEN' : 'CLOSED' }}</p>
                        </div>
                    </div>

                    <!-- Charts -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <h3 class="text-lg font-semibold text-white mb-4">QPS 趋势</h3>
                            <div id="qpsChart" class="w-full h-64"></div>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700">
                            <h3 class="text-lg font-semibold text-white mb-4">服务列表</h3>
                            <div class="space-y-2 max-h-64 overflow-y-auto">
                                <div v-for=""s in services" :key="s.name" class="bg-slate-800/50 rounded-lg p-3 border border-slate-700">
                                    <div class="flex justify-between items-center">
                                        <span class="text-white font-medium">{{ s.name }}</span>
                                        <span class="text-green-400 text-sm">{{ s.instances || 0 }} 实例</span>
                                    </div>
                                </div>
                                <p v-if="!services.length" class="text-slate-500 text-center py-4">暂无服务</p>
                            </div>
                        </div>
                    </div>

                    <!-- Circuit Breakers -->
                    <div class="glass rounded-2xl p-6 border border-slate-700">
                        <h3 class="text-lg font-semibold text-white mb-4">熔断器状态</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div v-for=""cb in circuits" :key="cb.name" class="bg-slate-800/50 rounded-lg p-4 border" :class="cb.state=='OPEN'?'border-red-500':cb.state=='HALF_OPEN'?'border-yellow-500':'border-green-500'">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="font-medium text-white">{{ cb.name }}</span>
                                    <span class="px-2 py-1 rounded text-xs" :class="cb.state=='OPEN'?'bg-red-500/20 text-red-400':cb.state=='HALF_OPEN'?'bg-yellow-500/20 text-yellow-400':'bg-green-500/20 text-green-400'">{{ cb.state }}</span>
                                </div>
                                <div class="grid grid-cols-3 gap-2 text-xs text-slate-400">
                                    <div>成功: {{ cb.successfulRequests || 0 }}</div>
                                    <div>失败: {{ cb.failedRequests || 0 }}</div>
                                    <div>阻止: {{ cb.blockedRequests || 0 }}</div>
                                </div>
                            </div>
                            <p v-if="!circuits.length" class="text-slate-500 text-center py-4 col-span-3">暂无熔断器数据</p>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const metrics = ref({});
                const services = ref([]);
                const circuits = ref([]);
                const qpsChart = ref(null);
                const qpsHistory = ref([]);

                const openCount = computed(() => circuits.value.filter(c => c.state === 'OPEN').length);

                const loadData = async () => {
                    try {
                        const [mRes, sRes, cRes] = await Promise.all([
                            fetch('/api/metrics/all'),
                            fetch('/api/services'),
                            fetch('/api/circuit-breakers')
                        ]);
                        metrics.value = await mRes.json();
                        services.value = (await sRes.json()).data || [];
                        circuits.value = (await cRes.json()).data || [];
                    } catch(e) { console.error(e); }
                };

                const initChart = () => {
                    qpsChart.value = echarts.init(document.getElementById('qpsChart'));
                    qpsChart.value.setOption({
                        backgroundColor: 'transparent',
                        xAxis: { type: 'time', axisLine: { lineStyle: { color: '#334155' } }, axisLabel: { color: '#94a3b8' },
                        yAxis: { type: 'value', axisLine: { lineStyle: { color: '#334155' } }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } },
                        series: [{ type: 'line', smooth: true, data: [], lineStyle: { color: '#3b82f6' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(59,130,246,0.3)' }, { offset: 1, color: 'transparent' }] } }]
                    });
                };

                onMounted(() => {
                    loadData();
                    initChart();
                    setInterval(loadData, 3000);
                });

                return { metrics, services, circuits, openCount, formatNumber: (n) => n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':n };
            }
        };

        // Services Component
        const Services = {
            template: `
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <h2 class="text-3xl font-bold text-white mb-2">📋 服务列表</h2>
                    <input v-model="search" placeholder="搜索服务..." class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white mb-6">
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div v-for=""s in filteredServices" :key="s.name" class="glass rounded-2xl p-6 border border-slate-700 cursor-pointer hover:border-violet-500" @click="showDetail(s)">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="font-bold text-white">{{ s.name }}</h4>
                                <span class="w-3 h-3 rounded-full bg-green-400"></span>
                            </div>
                            <p class="text-slate-400 text-sm">实例: {{ s.instances || 0 }}</p>
                            <p class="text-slate-400 text-sm">调用: {{ formatNumber(s.totalCalls || 0) }}</p>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const services = ref([]);
                const search = ref('');
                const load = () => fetch('/api/services').then(r=>r.json()).then(d => services.value = d.data || []);
                onMounted(() => { load(); setInterval(load, 5000); });
                return { services, search, filteredServices: computed(() => services.value.filter(s => s.name.toLowerCase().includes(search.value.toLowerCase()))), formatNumber: n=>n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':n, showDetail: s=>alert('服务详情: ' + s.name) };
            }
        };

        // Circuit Component
        const Circuit = {
            template: `
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <h2 class="text-3xl font-bold text-white mb-2">🔴 熔断器管理</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="glass rounded-xl p-4 border border-slate-700 text-center">
                            <p class="text-3xl font-bold">{{ circuits.length }}</p>
                            <p class="text-slate-400 text-sm">总数</p>
                        </div>
                        <div class="glass rounded-xl p-4 border border-red-500/30 text-center">
                            <p class="text-3xl font-bold text-red-400">{{ closedCount }}</p>
                            <p class="text-slate-400 text-sm">OPEN</p>
                        </div>
                        <div class="glass rounded-xl p-4 border border-green-500/30 text-center">
                            <p class="text-3xl font-bold text-green-400">{{ openCount }}</p>
                            <p class="text-slate-400 text-sm">CLOSED</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div v-for=""cb in circuits" :key="cb.name" class="glass rounded-2xl p-6 border" :class="cb.state=='OPEN'?'border-red-500':cb.state=='HALF_OPEN'?'border-yellow-500':'border-green-500'">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="font-bold text-lg text-white">{{ cb.name }}</h4>
                                <span class="px-3 py-1 rounded font-bold" :class="cb.state=='OPEN'?'bg-red-500/20 text-red-400':cb.state=='HALF_OPEN'?'bg-yellow-500/20 text-yellow-400':'bg-green-500/20 text-green-400'">{{ cb.state }}</span>
                            </div>
                            <div class="grid grid-cols-3 gap-4 text-center mb-4">
                                <div><p class="text-2xl font-bold text-green-400">{{ cb.successfulRequests || 0 }}</p><p class="text-xs text-slate-400">成功</p></div>
                                <div><p class="text-2xl font-bold text-red-400">{{ cb.failedRequests || 0 }}</p><p class="text-xs text-slate-400">失败</p></div>
                                <div><p class="text-2xl font-bold text-yellow-400">{{ cb.blockedRequests || 0 }}</p><p class="text-xs text-slate-400">阻止</p></div>
                            </div>
                            <button @click="reset(cb.name)" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg">重置</button>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const circuits = ref([]);
                const load = () => fetch('/api/circuit-breakers').then(r=>r.json()).then(d => circuits.value = d.data || []);
                const reset = async (name) => {
                    if(confirm('重置 ' + name + '?')) {
                        await fetch('/api/circuit-breaker/' + encodeURIComponent(name) + '/reset', { method: 'POST' });
                        load();
                    }
                };
                onMounted(() => { load(); setInterval(load, 5000); });
                return { circuits, openCount: computed(() => circuits.value.filter(c=>c.state==='OPEN').length), closedCount: computed(() => circuits.value.filter(c=>c.state==='CLOSED').length), reset };
            }
        };

        // System Component
        const System = {
            template: `
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <h2 class="text-3xl font-bold text-white mb-2">💻 系统状态</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="glass rounded-2xl p-6 border border-slate-700 text-center">
                            <p class="text-3xl font-bold text-green-400">UP</p>
                            <p class="text-slate-400 text-sm">状态</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700 text-center">
                            <p class="text-3xl font-bold text-blue-400">{{ memPercent }}%</p>
                            <p class="text-slate-400 text-sm">内存使用</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700 text-center">
                            <p class="text-3xl font-bold text-purple-400">{{ cpu }}</p>
                            <p class="text-slate-400 text-sm">CPU 核心</p>
                        </div>
                        <div class="glass rounded-2xl p-6 border border-slate-700 text-center">
                            <p class="text-3xl font-bold text-yellow-400">{{ uptime }}</p>
                            <p class="text-slate-400 text-sm">运行时长</p>
                        </div>
                    </div>
                    <div class="glass rounded-2xl p-6 border border-slate-700">
                        <h3 class="text-lg font-semibold text-white mb-4">JVM 内存</h3>
                        <div id="memChart" class="w-full h-64"></div>
                    </div>
                </div>
            `,
            setup() {
                const health = ref({});
                const memPercent = ref(0);
                const cpu = ref(0);
                const uptime = ref('0s');
                const startTime = Date.now();
                let memChart = null;

                const load = async () => {
                    const res = await fetch('/api/health');
                    health.value = (await res.json()).data || {};
                    const sys = health.value.components?.system || {};
                    cpu.value = sys.availableProcessors || 0;
                    memPercent.value = sys.maxMemory ? Math.round((sys.usedMemory / sys.maxMemory) * 100) : 0;
                    
                    if (memChart) {
                        memChart.setOption({
                            series: [{ data: [[{value:sys.usedMemory,itemStyle:{color:'#ef4444'}},{value:sys.maxMemory-sys.usedMemory,itemStyle:{color:'#22c55e'}}]}]
                        });
                    }
                };

                onMounted(() => {
                    memChart = echarts.init(document.getElementById('memChart'));
                    memChart.setOption({
                        backgroundColor: 'transparent',
                        series: [{ type: 'pie', radius: ['40%','70%'], data: [] }]
                    });
                    load();
                    setInterval(load, 5000);
                    setInterval(() => {
                        const s = Math.floor((Date.now() - startTime) / 1000);
                        uptime.value = s < 60 ? s + 's' : s < 3600 ? Math.floor(s/60)+'m' : Math.floor(s/3600)+'h';
                    }, 1000);
                });
                return { memPercent, cpu, uptime };
            }
        };

        // Router
        const routes = [
            { path: '/', redirect: '/dashboard' },
            { path: '/dashboard', component: Dashboard },
            { path: '/services', component: Services },
            { path: '/circuit', component: Circuit },
            { path: '/system', component: System }
        ];

        const router = createRouter({
            history: createWebHistory(),
            routes
        });

        createApp({}).use(router).mount('#app');
    </script>
</body>
</html>
