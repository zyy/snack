name: Snack RPC Demo

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # Manual trigger

jobs:
  demo:
    runs-on: ubuntu-latest
    
    services:
      zookeeper:
        image: zookeeper:3.8
        ports:
          - 2181:2181
        options: >-
          --health-cmd "zkServer.sh status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2

    - name: Build project
      run: mvn clean compile -DskipTests

    - name: Prepare demo configuration
      run: |
        cp demo/application-service.conf snack-service-demo/src/main/resources/application.conf
        cp demo/application-web.conf snack-web-demo/src/main/resources/application.conf

    - name: Start Service Provider
      run: |
        cd snack-service-demo
        mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.port=9999" &
        SERVICE_PID=$!
        echo "SERVICE_PID=$SERVICE_PID" >> $GITHUB_ENV
        sleep 15

    - name: Start Web Consumer
      run: |
        cd snack-web-demo
        mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.port=8080" &
        WEB_PID=$!
        echo "WEB_PID=$WEB_PID" >> $GITHUB_ENV
        sleep 15

    - name: Test RPC call
      run: |
        echo "Testing RPC call..."
        for i in {1..10}; do
          RESPONSE=$(curl -s --connect-timeout 5 http://localhost:8080/demo/hello || true)
          if [ -n "$RESPONSE" ]; then
            echo "✅ Success! Response from RPC call: $RESPONSE"
            echo "DEMO_STATUS=success" >> $GITHUB_ENV
            break
          else
            echo "Attempt $i: Waiting for services to be ready..."
            sleep 5
          fi
        done
        
        if [ -z "${RESPONSE}" ]; then
          echo "❌ Failed to get response from RPC call"
          echo "Checking service logs..."
          ps aux | grep java
          echo "DEMO_STATUS=failed" >> $GITHUB_ENV
          exit 1
        fi

    - name: Test Admin API (tracing)
      run: |
        echo "Testing Admin tracing API..."
        # Start admin in background
        cd snack-admin
        mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dserver.port=9090" &
        ADMIN_PID=$!
        echo "ADMIN_PID=$ADMIN_PID" >> $GITHUB_ENV
        sleep 10
        
        # Make a few more calls to generate traces
        for i in {1..3}; do
          curl -s http://localhost:8080/demo/hello > /dev/null
          sleep 1
        done
        
        # Check traces API
        TRACES=$(curl -s http://localhost:9090/trace/list?limit=5 || true)
        if [ -n "$TRACES" ]; then
          echo "✅ Tracing API is working"
          echo "Traces response: $TRACES"
        else
          echo "⚠️ Could not get traces (might be empty)"
        fi

    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up..."
        kill $SERVICE_PID $WEB_PID $ADMIN_PID 2>/dev/null || true
        pkill -f "spring-boot:run" 2>/dev/null || true